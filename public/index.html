<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">🐔</div>
                <h1>Chicken Chat</h1>
                <p class="subtitle">Мессенджер для своих</p>
                <div class="login-form">
                    <input type="text" id="nickname-input" placeholder="Введи свой ник..." maxlength="20" autocomplete="off">
                    <button id="login-btn" class="btn-primary">Войти</button>
                </div>
                <p class="error-msg" id="login-error"></p>
            </div>
        </div>

        <div id="chat-screen" class="screen">
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="logo-small">🐔</div>
                    <span class="app-name">Chicken Chat</span>
                </div>

                <div class="user-bar">
                    <div class="user-avatar" id="my-avatar"></div>
                    <span id="current-user-name" class="my-name"></span>
                    <button id="logout-btn" class="btn-icon" title="Выйти">⏻</button>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <span>Комнаты</span>
                        <button id="create-room-btn" class="btn-icon" title="Создать комнату">+</button>
                    </div>
                    <div id="room-list" class="room-list"></div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <span>Онлайн</span>
                        <span id="online-count" class="badge">0</span>
                    </div>
                    <div id="user-list" class="user-list"></div>
                </div>
            </div>

            <div id="chat-area" class="chat-area">
                <div id="no-room" class="no-room">
                    <div class="logo-big">🐔</div>
                    <h2>Добро пожаловать в Chicken Chat!</h2>
                    <p>Выбери комнату или создай новую</p>
                </div>

                <div id="chat-container" class="chat-container hidden">
                    <div class="chat-header">
                        <button id="menu-toggle" class="btn-icon mobile-only">☰</button>
                        <div class="chat-header-info">
                            <h3 id="chat-room-name"></h3>
                            <span id="chat-room-desc"></span>
                        </div>
                        <div id="typing-indicator" class="typing-indicator hidden"></div>
                        <button id="call-btn" class="btn-icon" title="Позвонить" style="display:none">📞</button>
                        <button id="invite-btn" class="btn-icon" title="Пригласить в комнату">👤+</button>
                    </div>

                    <div id="messages" class="messages"></div>

                    <div id="message-input-area" class="message-input-area">
                        <div id="file-preview" class="file-preview hidden"></div>
                        <div class="input-row">
                            <button id="attach-btn" class="btn-icon" title="Прикрепить файл">📎</button>
                            <button id="voice-btn" class="btn-icon" title="Голосовое сообщение">🎤</button>
                            <input type="text" id="message-input" placeholder="Напиши сообщение..." autocomplete="off">
                            <button id="send-btn" class="btn-send">➤</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="create-room-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Создать комнату</h3>
                <input type="text" id="room-name-input" placeholder="Название комнаты..." maxlength="50">
                <textarea id="room-desc-input" placeholder="Описание (необязательно)..." maxlength="200"></textarea>
                <div class="modal-buttons">
                    <button id="cancel-room-btn" class="btn-secondary">Отмена</button>
                    <button id="confirm-room-btn" class="btn-primary">Создать</button>
                </div>
            </div>
        </div>

        <div id="voice-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Голосовое сообщение</h3>
                <div id="voice-visualizer" class="voice-visualizer">
                    <canvas id="voice-canvas"></canvas>
                </div>
                <div class="voice-controls">
                    <button id="voice-record-btn" class="btn-record">⏺ Записать</button>
                    <button id="voice-cancel-btn" class="btn-secondary">Отмена</button>
                    <button id="voice-send-btn" class="btn-primary" disabled>Отправить</button>
                </div>
            </div>
        </div>

        <div id="invite-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Пригласить в комнату</h3>
                <p id="invite-room-name" style="color:var(--accent);margin-bottom:0.5rem"></p>
                <div id="invite-user-list" class="invite-list"></div>
                <div class="modal-buttons">
                    <button id="cancel-invite-btn" class="btn-secondary">Закрыть</button>
                </div>
            </div>
        </div>

        <div id="call-modal" class="modal hidden">
            <div class="modal-content call-modal-content">
                <div class="call-status">
                    <div class="call-avatar" id="call-avatar"></div>
                    <h3 id="call-name"></h3>
                    <p id="call-status-text" class="call-status-text">Вызов...</p>
                    <p id="call-timer" class="call-timer">00:00</p>
                </div>
                <div class="call-video-area">
                    <video id="remote-video" autoplay playsinline></video>
                    <video id="local-video" autoplay playsinline muted></video>
                </div>
                <div class="call-controls">
                    <button id="call-mute-btn" class="btn-call btn-mute" title="Микрофон">🎤</button>
                    <button id="call-camera-btn" class="btn-call btn-mute" title="Камера">📷</button>
                    <button id="call-screen-btn" class="btn-call btn-mute" title="Демонстрация экрана">🖥</button>
                    <button id="call-end-btn" class="btn-call btn-end" title="Завершить">📞</button>
                </div>
            </div>
        </div>

        <div id="incoming-call-modal" class="modal hidden">
            <div class="modal-content call-modal-content">
                <div class="call-status">
                    <div class="call-avatar" id="incoming-avatar"></div>
                    <h3 id="incoming-name"></h3>
                    <p class="call-status-text">Входящий звонок...</p>
                    <div class="call-type-select">
                        <button id="call-accept-audio" class="btn-call btn-accept">📞 Аудио</button>
                        <button id="call-accept-video" class="btn-call btn-accept">📷 Видео</button>
                    </div>
                </div>
                <div class="call-controls">
                    <button id="call-decline-btn" class="btn-call btn-end">✕ Отклонить</button>
                </div>
            </div>
        </div>

        <input type="file" id="file-input" class="hidden" multiple>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/files.js"></script>
    <script src="js/calls.js"></script>
</body>
</html>
